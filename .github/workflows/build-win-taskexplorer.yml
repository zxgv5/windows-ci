name: build-win-taskexplorer

on:
  workflow_dispatch:
  workflow_call:

env:
  QT_VERSION: '5.15.2'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout source repo
        uses: actions/checkout@main
        with:
          repository: DavidXanatos/TaskExplorer
          ref: master
          path: taskexplorer_source
          fetch-depth: 0
          submodules: recursive

      - name: Checkout ci source repo
        uses: actions/checkout@main
        with:
          path: ci_source

      - name: Generate timestamp
        shell: bash
        run: |
          echo "BUILD_DATE=$(TZ=UTC-8 date +"%y.%m.%d-%H.%M.%S")" >> $GITHUB_ENV

      - name: Install qt
        shell: pwsh
        run: |
          pip install aqtinstall
          aqt install-qt --outputdir "${{ github.workspace }}\taskexplorer_source\Qt" `
            windows desktop "${{ env.QT_VERSION }}" win64_msvc2019_64 --modules qtcharts qtscript
          aqt install-tool --outputdir "${{ github.workspace }}\taskexplorer_source\Qt" `
            windows desktop tools_qtcreator
          $qtDir = "${{ github.workspace }}\taskexplorer_source\Qt\${{ env.QT_VERSION }}\msvc2019_64"
          echo "QTDIR=$qtDir" >> $env:GITHUB_ENV
          echo "$qtDir\bin" >> $env:GITHUB_PATH
          echo "Qt5_DIR=$qtDir\lib\cmake\Qt5" >> $env:GITHUB_ENV

      - name: Setup msbuild
        uses: microsoft/setup-msbuild@main

      # 修复 phlib 项目中的头文件路径问题（通过创建目录链接）
      - name: Fix phlib include paths
        shell: pwsh
        working-directory: ./taskexplorer_source/ProcessHacker
        run: |
          # 创建必要的目录链接，使得项目文件中错误的路径 phlib\phlib\include 指向真实的 phlib\include
          if (-not (Test-Path "phlib\phlib")) { New-Item -ItemType Directory -Force -Path "phlib\phlib" }
          cmd /c mklink /J "phlib\phlib\include" "phlib\include" 2>$null
          if (Test-Path "phlib\phlib\include") { Write-Host "Created junction for phlib\phlib\include -> phlib\include" }
          else { Write-Host "Failed to create junction" }

      - name: Build phlib (user-mode library)
        working-directory: ./taskexplorer_source/ProcessHacker/phlib
        run: msbuild phlib.vcxproj /p:Configuration=Release /p:Platform=x64 /m

      - name: Build main solution (TaskExplorer+Libs.sln) x64
        working-directory: ./taskexplorer_source
        run: msbuild "TaskExplorer+Libs.sln" /p:Configuration=Release /p:Platform=x64 /m

      - name: Locate output files
        id: locate_output
        shell: pwsh
        working-directory: ./taskexplorer_source
        run: |
          $exe = Get-ChildItem -Recurse -Filter "TaskExplorer.exe" -ErrorAction SilentlyContinue | Select-Object -First 1
          if ($exe) {
            $outDir = $exe.Directory.FullName
            echo "Output directory: $outDir"
            echo "OUTPUT_DIR=$outDir" >> $env:GITHUB_OUTPUT
          } else {
            Write-Host "TaskExplorer.exe not found, using default bin\x64\Release"
            $default = "${{ github.workspace }}\taskexplorer_source\bin\x64\Release"
            if (Test-Path $default) {
              echo "OUTPUT_DIR=$default" >> $env:GITHUB_OUTPUT
            } else {
              Write-Host "Default output directory not found either, failing"
              exit 1
            }
          }

      - name: Create zip archive locally
        working-directory: ./taskexplorer_source
        shell: pwsh
        run: |
          $zipName = "../dist/taskexplorer-${{ env.BUILD_DATE }}.zip"
          $source = "${{ steps.locate_output.outputs.OUTPUT_DIR }}"
          $tempDir = "./temp_zip_dir"
          New-Item -ItemType Directory -Path "../dist" -Force | Out-Null
          if (Test-Path $tempDir) { Remove-Item -Recurse -Force $tempDir }
          New-Item -ItemType Directory -Path $tempDir -Force | Out-Null
          robocopy $source $tempDir * /S
          if ($LASTEXITCODE -ge 8) {
              throw "robocopy failed with exit code $LASTEXITCODE"
          }
          Compress-Archive -Path "$tempDir/*" -DestinationPath $zipName -CompressionLevel Optimal -Force
          Remove-Item -Recurse -Force $tempDir
          Write-Host "zip archive created: $zipName"
          exit 0

      - name: Encrypt package and create release
        uses: ./ci_source/.github/actions/aes256pac_release
        with:
          ZIP_AES256_PWD: ${{ secrets.ZIP_AES256_PWD }}
          BUILD_ARTIFACT_PATH: "./dist/taskexplorer-${{ env.BUILD_DATE }}.zip"
          RELEASE_TAG_NAME: "${{ env.BUILD_DATE }}-taskexplorer"